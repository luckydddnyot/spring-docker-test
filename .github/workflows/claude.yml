name: Claude Code

# 이슈가 열리거나(@claude 멘션 포함), 이슈/PR 댓글에 @claude 를 멘션하면 실행됨
on:
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write        # 코드 수정/커밋
  pull-requests: write   # PR 생성/수정
  issues: write          # 이슈 응답
  id-token: write        # Claude 액션 OIDC 인증(필수)

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Claude 액션이 브랜치 생성/푸시할 수 있도록 전체 히스토리 체크아웃
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # 비용 절감용(선택): 반복 횟수/모델 제한
          # claude_args: "--max-turns 5 --model claude-sonnet-4-6"
